<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <fieldset>
        <legend>할인율 구하기</legend>
        가격: <input type="text" id="price">원 <br>
        할인율: <input type="text" id="rate">% <br>
        <button onclick="clickResult()" id="result">할인 가격 계산</button>
    </fieldset>
    <!-- 가격과 할인율에 따른 지불금액을 구하기 -->
    <!-- 가격: / 할인율: / 할인금액: / 지불금액: -->
    <h1 id="printResult"></h1>

    <script>
        const price = document.getElementById('price');
        const rate = document.getElementById('rate');

        //event
        // function clickResult() {

        // let salePrice = Number(price.value) * (Number(rate.value) / 100);
        // let payPrice = Number(price.value) - salePrice;

        //     document.getElementById("printResult").innerText =
        //     `
        //     가격: ${price.value}원
        //     할인율: ${rate.value}%
        //     할인금액: ${salePrice}원
        //     지불금액: ${payPrice}원
        //     `;
        // }

        //리스너
        document.getElementById("result").addEventListener("click", function () {

            let salePrice = Number(price.value) * (Number(rate.value) / 100);
            let payPrice = Number(price.value) - salePrice;
            printResult.innerText = `
            가격: ${price.value}원
            할인율: ${rate.value}%
            할인금액: ${Math.round(salePrice)}원
            지불금액: ${Math.round(payPrice)}원
            `
        })

    </script>
</body>

</html>
