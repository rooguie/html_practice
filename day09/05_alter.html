<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 
        confirm 창을 띄워 확인 버튼을 누르면
        '확인버튼 클릭' or '취소버튼 클릭'
    -->

    <h1 id="printResult"></h1>

    <script>
        let con = confirm();

        if (con) {
            document.getElementById('printResult').innerText =
                `확인버튼 클릭`;
        }

        else {
            document.getElementById('printResult').innerText =
                `취소버튼 클릭`;
        }

    </script>
</body>

</html>
