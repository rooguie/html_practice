<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>
        string: 가장 많이 다루는 데이터 타입
    </h1>
    <!-- 
        - java에서의 string method와 거의 유사함.
        -문자 데이터는 index(0부터 시작)를 가지고 있음.
        -개행문자 <br> 문자열 내에서는 안쓰는 것이 좋음.
        -length: 문자열의 총길이 (문자열에서 공백: 띄어쓰기도 한글자로 포함.)
        -new String(): 객체 타입으로 선언 가능/ 잘 쓰이지는 않음
    -->

    <!-- 
        추출 관련 메서드: substring(), substr(), slice()
        문자 대체 관련 메서드: replace(str, old, new) => 처음 찾은 값만 변환
        -trim(): 양쪽 공백 제거
        -charAt(index) / indexOF(str,문자)
        -padStart(str, 길이, 채울문자) / padEnd
            010101-3******
        -startWith(str, 문자) / endWith
            해당 문자가 str의 앞 또는 뒤에 존재하는지 확인하는 메서드
    -->

    <script>
        let str = 'apple, banana, orange';
        //substring / slice(start, end): start번지부터 end번지까지 추출 end 미포함
        //substr(start, count)
        console.log(str.slice(0, 5));
        console.log(str.substring(7, 13));
        console.log(str.substr(7, 6)); //7번지부터 6개
        console.log(str.slice(-6)); //끝에서부터 추출이 가능
        console.log(str.substring(-6)); //음수를 인지를 못함

        console.log('-----------------------------------');
        // 자료형 변수명 . => 자료형에 사용할 수 있는 메서드들 목록 출력
        // 현시점에 객체의 상태가 어떤 상태인지 불분명하면 메소드를 표시하지 않음.

        let str2 = "Hello java world~!! java";
        //replace 처음 일치하는 값만 변경
        console.log(str2.replace('java', 'javascript'));

        //replaceAll: 전체 변경 가능
        console.log(str2.replaceAll('java', 'javascript'));

        //replace 정규표현식 가능(RegExp)
        // /java/옵션 => i(대소문자 구분X), g(전체 검색) ig
        console.log(str2.replace(/java/g, 'javascript'));

        let padText = 'abc';
        console.log(padText.padStart(10, '-'));
        console.log(padText.padEnd(10, '-'));

        // 010101-3******
        let rNum = '010101-3123456';

        console.log((rNum.slice(0, 8)).padEnd(rNum.length,'*'));

        //성별 구하기: 삼항 연산자

        let id=rNum.charAt(rNum.indexOf('-')+1);

        console.log((id==='1' || id === '3')?'남':'여');

        let fullFileName='20260512_javascript.String_method.html';
        //작성일자만 추출:20260512
        let date=fullFileName.slice(0,fullFileName.indexOf('_'));
        console.log(date);


        //파일명 추출: javascript.String_method
        let fileName=fullFileName.slice(fullFileName.indexOf('_')+1,fullFileName.lastIndexOf('.'));
        console.log(fileName);


        //확장자만 추출:
        console.log(fullFileName.slice(fullFileName.lastIndexOf('.')+1));

        console.log("ABC".toLocaleLowerCase()); //대소문자 변환
        console.log(str.split(",")); // String[] 값을 리턴





    </script>
</body>

</html>
