<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>
        getElementBy** / querySelector
    </h1>
    <h1>test</h1>
    <!-- 
        getElementBy**
        -ID: 한 화면에서(document) 유일 함 => 유일한 객체로 잡힘.
        -tagName: 배열로 들어옴
        -ClassName: 배열로 들어옴
    -->

    <script>
        const h1=document.getElementsByTagName('h1');
        console.log(h1);
        console.log(h1[0].innerText);
        console.log(h1[1].innerText);
        
        const h1Query=document.querySelectorAll('h1');
        console.log(h1Query);
        console.log(h1Query[0].innerText);

        //alter: 안내문을 띄워주는 창 => 확인버튼

</html>
