<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <h1>
        JSON(JavaScript Object Notation)
    </h1>
    <!-- 
        -많은 양의 데이터를 실시간으로 전달되어야 할 때 가장
        효율적이고, 편리한 데이터 전송 방식 JSON
        -JSON: javascript 객체를 구조화된 데이터로 표현하기 위한 문자 기반의 표준 포맨
        -화면 <-> 서버 데이터를 전송할 때 일반적으로 사용

        XML
        <name>IU</name>
        <age>20</age>

        JSON
        {
            name: 'IU',
            age:20
        }

        -자바스크립트의 객체 형태를 띄기 때문에 구조 파악이 쉽고, 제작도 쉬움. XML->JSON
        -모든 웹 분야에서 화면은 자바스크립트가 모든 프론트에서 호환가능
        -데이터 수집, 출력하는 용도로 거의 모든 플랫폼에서 사용되고 있음

        -object -> string : 원하는 서버로 전송
        -string -> 각자 서버에서 처리할 수 있는 객체로 변환(json 라이브러리)
        
        -자바스크립트에서는 JSON 객체를 String으로 변환하고, string -> object 변경하는 명령어가
        이미 있음

        JSON.stingify(object) => 서버로 전송가능한 string 객체로 변경
        JSON.parse(string) => object 변경
    -->
    <script>
        const top1 = {

                }
            ],
            '상승': [
                {

                },

                    price: 1482,

                },
                {

                    price: 4290,

            ],
            '하락': [
                {

                {

            '시가총액 상위': [
                {

        console.log(top1); //object

        let topString = JSON.stringify(top1);

        let topObject=JSON.parse(topString);
        console.log(topObject);
        
    </script>
</body>
