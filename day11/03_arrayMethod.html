<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1">배열관련 메서드</h1>
    <!-- 
        []
        -유사배열(HTMLCollection / NodeList)
        -혼합 배열 myArray =[1,2,3,'a','b','c',[1,2,3],{key:'value'}];
        -유사배열, 혼합배열에서는 사용 제한이 되는 메서드들도 있다.
    -->

    <!-- 
        -array.push(value): 배열의 마지막 위치에 value를 추가

        -array.pop(value): 배열의 마지막 요소를 제거
            => 제거한 요소를 리턴
        
        -array.shift(): 배열의 첫 요소를 제거

        -array.unshift(value): 배열의 첫 요소에 value를 추가, 나머지 인덱스들이 뒤로 밀림
            => 배열 길이를 리턴

        -array.join(value): 배열의 값에 특별한 value를 추가하여 하나의 문자열로 리턴
            => 1 2 3 array.join(",") => 1,2,3 하나의 텍스트로 리턴

    -->

    <script>
        const h1 =document.getElementById('h1');
        console.log(h1);

        const h =document.getElementById('h1');
        console.log(h);

        let str='apple,banana,kiwi';
        let array = str.split(',');
        console.log(array);
        console.log(array.join("/")); // apple/banana/kiwi

        console.log("------------------------------------------");
        array.push("orange");
        console.log(array);
        console.log(array.push("orange")); //length 리턴
        //배열은 중복 가능 => index로 구분이 가능하기 때문에

        console.log(array);
        console.log(array.pop());
        console.log(array);

        // shift 배열의 첫 요소 제거
        console.log(array.shift());
        console.log(array);

        //unshift(value): 첫 요소를 추가
        console.log(array.unshift('AAA'));
        console.log(array);

        //일반적으로 빈배열을 만들어두고, 하나씩 추가하여 사용
        const array1=[];

    </script>
</body>
</html>
