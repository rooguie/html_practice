<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>
        자바스크립트에서 배열은 java에서의 list, array를 섞어 놓은 형태
    </h1>
    <!-- 
        -list처럼 크기가 유동적임 / method를 제공
        -표현은 배열처럼 arr[0]
        -index를 가짐: 0부터 시작
        -length: 배열의 총길이
        -const array =[] : 빈 배열은 만든 후 데이터를 추가하여 사용
        -const member=[{...},{....},{....},{....}]; //일반적인 구조
        -const arr= new Array(1,2,3); 가능은 하지만 잘 사용하지 않음
    </h1>
    -->

    <script>
        // javascript 에서의 배열은 타입 혼용이 가능
        const myArray=[1,2,3,'a','b','c',[1,2,3],{key:'value'}];
        console.log(myArray);
        console.log(myArray.length);
        console.log(myArray[0]); //for문 사용 가능
        //요소의 마지막 번지 length-1
        console.log(myArray[myArray.length-1]);

        //배열의 마지막 요소에 값을 추가
        myArray[myArray.length-1]=10;
        console.log(myArray);

        myArray[1]=20;
        console.log(myArray);

        myArray[10]=100;
        console.log(myArray);

        console.log('-----------');

        for(let i=0;i<myArray.length;i++){
            console.log(myArray[i] ?? '빈값')
        }

        console.log('-----------');

        for(let a of myArray){
            console.log(a ?? '빈값')
        }

        //const로 객체를 정의하면 객체 자체가 바뀌는 일은 불가능
        // 해당 객체의 요소가 바뀌는건 불가능
        myArray=[]; //다른 객체가 오는건 불가능.(메모리상의 주소가 바뀌기 때문)
    </script>
</body>
</html>
