<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul{
            list-style: none;
        }
    </style>
</head>

<body>
    <fieldset>
        <legend>구구단</legend>
        구구단: <input type="text" id="dan"> <br>
        <button id="btn">구구단 출력</button>
        <button id="reset">초기화</button>
        <ul id="ul"></ul>
    </fieldset>
    
    <script>
        document.getElementById("reset").addEventListener("click",()=>{
            // document.getElementById("ul").innerHTML='';
            location.reload(); //새로고침 기능
        });

        document.getElementById("btn").addEventListener("click",printDan)

        function printDan(){
            const dan=Number(document.getElementById("dan").value);
            let count=1;  
            let str=document.getElementById("ul");

            while(count<=9){
                str.innerHTML+=`<li>${dan}X${count}=${dan*count}</li>`;
                count++
            }

        }
    </script>

</body>
</html>
