<body>
    <h1>반복문: for, while, do~while</h1>
    <!-- 
        -반복문의 문법은 java의 문법과 동일
        -for: 반복 횟수가 명확할 때 사용

        -while, do~while: 반복 횟수가 명확하지 않을 때

        -모든 조건은 true 일 때 반복
        -조건식이 계속 true면 무한루프에 빠질 수 있음.
        -코드안에 조건식의 값이 false로 바뀔 수 있는 구문이 반드시 있어야함.
        -break;를 통해 조건식을 동반하여 빠져나갈 수 있음.
    -->

    <script>
        // for(let i=0; i<=10; i++){
        //     console.log(i);
        // }

        // console.log("----------------");

        // let count=1;

        // while(count<=10){
        //     console.log(count);
        //     count++;
        // }

        //구구단 3단 출력
        let dan=3;
        let incre=1;

        while(incre<=9){
            let result=dan*incre;

            console.log(`${dan}X${incre}=${result}`);
            incre++;
        }
    </script>
</body>
