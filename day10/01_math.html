<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>수학관련 함수</h1>
    <!-- 
        -Math.method: 수학 관련한 함수 제공
        -java와 동일한 함수 제공
        -Math.random(): 0은 포함 1은 미포함
        -Math.round(),Math.floor(), Math.ceil()
        -Math.max(), Math.min()
        난수 발생
        Math.floor(Math.random() * count) + start
    -->
    <button onclick="btn()">난수 발생
    </button>
    <h1 id="printResult"></h1>

    <script>
        //1~10의 난수 생성
        let num = Math.floor(Math.random() * 10) + 1;
        console.log(num);

        //범위의 값을 난수로 발생
        //시작값이 1이 아니라면 21~50 start=21 / count = 30
        //min, max / start=min / count=(max-min)
        //Math.floor(Math.random()*(max-min))+min;
        let max = 50;
        let min = 21;
        let num2 = Math.floor(Math.random() * (max - min)) + min;
        console.log(num2);

        //50부터 100까지의 난수 중 하나를 printResult에 출력하는 함수를 생성 => btn 적용

        function btn() {
            max = 100;
            min = 50;
            num2 = Math.floor(Math.random() * (max - min)) + min;

            let printResult = document.getElementById("printResult");

            printResult.innerText=`
            난수:${num2}
            `;
        }

    </script>

</body>

</html>
