<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes appear {
            from {
                opacity: 0;

            }

            to {
                opacity: 1;

            }
        }

        body {

            background-image: url(../image/spooky-silhouette-walks-through-foggy-forest-trail-generative-ai.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .box1 {
            color: red;
            display: flex;
        }

        .box2 {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            padding: 50px 50px 50px;
            font-size: 25px;
            font-weight: 700;

        }

        .box2>a {
            text-decoration: none;
            color: red;
        }

        .inter-img img {
            width: 300px;
            height: 300px;
            position: absolute;
            top: 50%;
            left: 20%;


            box-sizing: border-box;

            padding-top: 20px;

            opacity: 0;
            text-align: center;
        }

        .inter-img img:hover {
            animation: appear 0.6s ease-out forwards;
        }
    </style>
</head>

<body>
    <a href="">
        <div class="box1">EXIT</div>
    </a>

    <div class="box2">
        <a href="">
            <div>HOME</div>
        </a>
        <a href="">
            <div>LOGIN</div>
        </a>
        <a href="">
            <div>SIGNUP</div>
        </a>
        <a href="">
            <div>BOARD</div>
        </a>

    </div>

    <div class="main-box">

    </div>

    <div class="inter-img">
        <a href="https://www.roomlescape.com/"> <img src="../image/pngwing.com (2).png" alt=""></a>
    </div>


</body>

</html>
