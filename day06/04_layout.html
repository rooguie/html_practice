<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        브라우저의 사이즈: 모니터, TV, 탭북, 핸드폰
        브라우저의 가로 사이즈에 따라 화면의 정보를 정확히 송출하기 위해
        width에 따라 반응형을 사용해줘야함
    -->
    <style>
        div{
            height: 100px;
            float: left;
        }
        .r{
            background-color: red;
        }

        .g{
            background-color: green;
        }

        .b{
            background-color: blue;
        }

        .o{
            background-color: orange;
        }

        .y{
            background-color: yellow;
        }

        .p{
            background-color: purple;
        }

        .gray{
            background-color: gray;
        }

        .w100{
            width: 100px;
        }

        .w25{
            width: 25px;
        }

        .w50{
            width: 50px;
        }
    </style>
</head>
<body>
    <div class="w100 r"></div>
    <div class="w25 g"></div>
    <div class="w50 b"></div>
    <div class="w25 o"></div>
    <div class="w50 y"></div>
    <div class="w50 p"></div>
    <div class="w100 gray"></div>
</body>
</html>
