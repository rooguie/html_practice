<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 
        div: 상자를 만들어주는 태그
        영역을 구분하는 역할 => 공간을 만들어주는 => layout 구조를 짜는 역할
        -컨테이너 역할을 하는 태그
        -사용량으로 놓고보면 가장 많이 사영하는 태그(80~90%)
        -시멘틱 웸(태그): div 태그에 의미를 부여한 개념
        -<div id="header"> </div> => <header></header>
        -<div id="container"></div> =><main></main>
        -<div id="root"></div> =><section></section>
        -<div id="footer"></div> => <footer></footer>
        -가독성을 높이기 위해, 동일성을 유지하기 위해
    -->
    <!-- 
            -block, inline, inlineblock
            -block
                -혼자 한 라인을 차지(새로운 라인에서 시작)
                -가로/세로 크기 조절이 가능
                -여백 조절 가능
                -div, h, p, form, table.....

            -inline
                -한 라인에서 계속 유지되는 태그
                -컨텐츠 자체가 태그의 크기가 됨
                -가로/세로 크기 조절이 불가능
                -여백 지정이 안됨
                -폰트 크기 지정이 가능
                -span, b, del, ins, i...

            -inlineblock
                -한 라인에서 계속 유지되는 태그
                -가로/세로 크기 조절이 가능
                -여백 지정 가능
                -input, img ...
        -->
    <div class="">div</div>
    <div class="box">box</div>
    <header>header tag</header>
    <main>main tag...</main>
</body>

</html>
