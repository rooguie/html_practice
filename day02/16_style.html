<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 여기는 css영역 html과 다른 코드와 다른 영역
        선택자{속성: 값; 속성: 값; }
        */
        img{
            width: 100px;
            height: 100px;
        }

    </style>
</head>
<body>
    <!-- 
        css: 스타일을 꾸며주는 기능
        -html 태그의 스타일을 꾸며주는 기능
        -css 적용하는 방법

        1. <style> 태그를 이용하여 스타일을 적용
            <head> 태그 내부에서 선언

        2. 각 태그마다 직접 style 속성을 적용하는 방법
        3. css 파일을 만들어 link를 이용하여 파일을 연결하는 방법 => 가장 많이 사용

        3번은 일반 실무에서 가장 많이 사용하는 방법
        수업에서는 1번 형식으로 사용
        2번은 거의 안씀. => 특별한 케이스에서만 사용
        
        선택자 tagName, class, id => 같은 선택자는 같은 스타일을 적용받음
    -->

    <img src="../image/다운로드.jpg" alt="강아지">
    <img src="../image/girl_silhouette_planet_1067694_1920x1080.jpg" alt="배경사진">
</body>
</html>
