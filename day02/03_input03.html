<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
    input 속성
    모든 태그는 자신의 속성값을 가지고 있음
    속성명="값" 속성명
    name: 서버로 전송시 변수명으로 사용되는 속성
    value: 서버로 전송 시 값으로 사용되는 속성
    id: 하나의 파일 안에 중복값이 불가능 => js에서 태그들을 구분하는 용도
        id가 겹쳐도 에러는 안남, 작동을 잘 하지 않거나 이상한 동작을 할 수 있음
    
    class: js/css 구분자 역할을 함. 중복가능/ 여러개 가능
    class="a b ab abc" => 4개의 클래스를 가짐. a b ab abc
    readonly: 읽기전용, 서버로 값을 보냄.
    disabled: 비활성화, 서버로 값을 안보냄
    required: 필수 속성
    checked: radio, checkbox에서 기본값으로 선택
    -->



    
</body>
</html>
