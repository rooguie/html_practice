<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .naver_color a{
            color: green;
        }

        .goole_color {
            color: black;
        }

        .youtube_color {
            color: red;
        }
    </style>
</head>

<body>
    <!-- 
    div를 3개를 만들어서
    naver, google, youtube 사이트에 각각 연결되게 하고
    각자 글자 색도 다르게 만들기 color 속성 부여
    -->
    <div class="naver_color">
        <a href="https://www.naver.com/">네이버</a>
    </div>
    
    <a href="https://www.google.com/" target="_blank">
        <div class="goole_color">구글</div>
    </a>
    <a href="https://www.youtube.com/" target="_blank">
        <div class="youtube_color">유튜브</div>
    </a>


    <!-- 
        전체 글자 크기 20px font-size
        짝수만 빨간색
        3,6,9: 초록색
        1,10: 굵게 font-weight: bold;700
    -->
        <ol >
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
            <li>6</li>
            <li>7</li>
            <li>8</li>
            <li>9</li>
            <li>10</li>
        </ol>

</body>

</html>
