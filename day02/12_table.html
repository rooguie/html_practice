<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 
        table: 표를 나타내는 태그(표 전체 박스)
        tr: 행(한 행을 의미)
        td: 열(한 칸을 의미)
        th: 열(제목열, 가운데 정렬, 굵은 글씨)
        3*4 테이블 생성
        tr * 3
        tr=> td*4
        총 td=12개
        모양=> css에서 크기, 색, 선 지정
        caption: 표에 제목을 붙이는 태그
        thead/ tbody/ tfoot

        -colspan: 열병합 / rowspan: 행병합
    -->
    <table border="1" width="50%">
        <caption>title</caption>
        <thead>
            <tr>
                <th>번호</th>
                <th>이름</th>
                <th>국어</th>
                <th>영어</th>
            </tr>
        </thead>


        <tbody>

                <td>98</td>
            </tr>
            <tr>

                <td>98</td>
            </tr>
            <tr>
                <td>3</td>
                <td>홍길동</td>
                <td>82</td>
                <td>98</td>
            </tr>
            <tr>
                <td>4</td>
                <td>홍길동</td>
                <td>82</td>
                <td>98</td>
            </tr>
        <tfoot>
            <tr>
                <td colspan="2">합계</td>
                <td>000</td>
                <td>000</td>
            </tr>
        </tfoot>
        </tbody>
    </table>

    <table border="1" width="50%">
