<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        button tag: input type="button" 과 같은 기능
        button type="button" /submit / reset
        form 태그와 같이 사용
        form 태그 안에서 버튼 태그의 기본 값이 submit
        input보다는 button 태그를 더 많이 사용
    -->
        <button>일반버튼</button>
        <button type="submit">submit 버튼</button>
        <button type="reset">reset 버튼</button>

        <form action="">
            <input type="text" name="id">
            <!-- form 안의 버튼의 기본값은 submit -->
            <button>submit</button>
        </form>
</body>
</html>
