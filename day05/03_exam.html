<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .naver-box {
            width: 700px;
            height: 60px;
            border: 1px solid rgb(248, 99, 145);

            border-top-left-radius: 33px;
            border-top-right-radius: 33px;
            border-bottom-right-radius: 33px;
            border-bottom-left-radius: 33px;
            float: left;
            position: relative;
        }

        .logo>a>img {
            position: absolute;
            width: 60px;
            height: 60px;


        }

        .search-text>input {
            position: absolute;
            font-size: 20px;

            width: 480px;
            height: 58px;
            left: 60px;

        }

        input {
            border: none;
            outline: none;
        }

        .button-box {
            position: absolute;
            width: 80px;
            height: 58px;
            right: 55px;

            padding-top: 10px;
        }

        .bi-grip-horizontal{

            width: 30px;
            height: 30px;
        }

        .keyboard{
            margin-right: 10px;
        }

        .bi-save2{
            width: 20px;
            height: 20px;
        }
       

        .search-icon>img {
            position: absolute;
            width: 40px;
            height: 40px;

            right: 15px;
            bottom: 10px;

        }

        button {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
        }

        .naver-box:hover {
            box-shadow: 0 10px 10px -5px gray;
        }
    </style>
</head>

<body>




    <div class="naver-box">

        <div class="logo">
            <a href="https://www.naver.com/" target="_blank"><img src="../image/imgi_146_pc.spring.n.png" alt=""></a>
        </div>

        <form class="search-text" action="">

            <input type="text" name="search" placeholder="검색어 입력">
            <div class="button-box">
                <button class="keyboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-grip-horizontal" viewBox="0 0 16 16">
                        <path
                            d="M2 8a1 1 0 1 1 0 2 1 1 0 0 1 0-2m0-3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m3 3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m0-3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m3 3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m0-3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m3 3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m0-3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m3 3a1 1 0 1 1 0 2 1 1 0 0 1 0-2m0-3a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
                    </svg>
                </button>

                <button class="scroll">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-save2" viewBox="0 0 16 16">
                        <path
                            d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H9.5a1 1 0 0 0-1 1v4.5h2a.5.5 0 0 1 .354.854l-2.5 2.5a.5.5 0 0 1-.708 0l-2.5-2.5A.5.5 0 0 1 5.5 6.5h2V2a2 2 0 0 1 2-2H14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h2.5a.5.5 0 0 1 0 1z" />
                    </svg>
                </button>
            </div>

            <button class="search-icon" type="submit">
                <img src="../image/imgi_84_default.png" alt="">
            </button>

        </form>
    </div>




</body>

</html>
