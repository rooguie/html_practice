<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            #03c75a
        */
        
        .search-box{
            width: 700px;
            height: 60px;
            margin: 50px auto;

            border: 1px solid #03c75a;
            border-radius: 30px;
        }
        
        .search-box>.icon{
            width: 50px;
            height: 50px;
            margin: 10px;
            background-image: url(../image/imgi_146_pc.spring.n.png);
            background-position: center;
            background-size: cover;

            float: left;
        }

        .search-box>input{
            width: 400px;
            height: 30px;
            margin-top: 15px;
            border: none;
            outline: none;
            font-size: 20px;
        }

        .search-box>.search-right{
            float: right;
            width: 150px;
            height: 30px;
            margin: 10px 20px;
            text-align: center;
        }

        .search-box>.search-right>a{
            text-decoration: none;
            color: gray;
        }


    </style>
</head>
<body>
    <form action="">
        <div class="search-box">
            <div class="icon"></div>
            <input type="text" placeholder="검색어를 입력하세요.">
            <div class="search-right">
                <a href="">키보드아이콘</a>
                <a href="">아래 삼각형</a>
                <button type="submit">
                    <img src="../image/다운로드.svg" alt="">
                </button>
            </div>
        </div>
    </form>
</body>
</html>
