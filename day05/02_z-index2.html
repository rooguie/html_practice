<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .contain {
            width: 300px;
            border: 1px solid black;
            text-align: center;
            margin: 20px auto;

        }

        .text1 {
            width: 270px;
            height: 50px;
            border: 2px solid black;
            text-align: center;
            margin: 15px;
            box-sizing: border-box;
            padding: 10px;
            font-weight: 700;

        }

        .content {
            width: 270px;
            height: 270px;
            border: 2px solid black;
            margin: 15px;
            box-sizing: border-box;
            position: relative;

        }

        .text2 {
            width: 270px;
            height: 50px;
            border: 2px solid black;
            text-align: center;
            margin: 15px;
            box-sizing: border-box;
            padding: 10px;
            font-weight: 700;
        }

        .box {
            width: 100px;
            height: 100px;
            position: absolute;
        }

        .box1 {
            background-color: red;

            top: 45px;
            left: 45px;
            z-index: 3;
            box-shadow: 5px 5px 10px gray;

        }

        .box2 {
            background-color: green;

            top: 80px;
            left: 80px;
            z-index: 2;
            box-shadow: 5px 5px 10px gray;
        }

        .box3 {
            background-color: blue;
            top: 115px;
            left: 115px;
            box-shadow: 5px 5px 10px gray;
        }
    </style>
</head>


<body>
    <div class="contain">

        <div class="text1">텍스트</div>


        <div class="content">
            <div class="box box1"></div>
            <div class="box box2"></div>
            <div class="box box3"></div>
        </div>


        <div class="text2">텍스트</div>

    </div>

</body>

</html>
