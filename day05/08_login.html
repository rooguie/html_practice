<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: antiquewhite;

        }

        .login-box {
            width: 300px;
            height: 170px;
            border-radius: 10px;
            border: 1px solid rgb(23, 200, 147);
            background-color: rgb(23, 200, 147);

            /* 화면 정중앙에 위치시키기 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            box-sizing: border-box;

            padding: 20px;
        }

        .login-box input {
            width: 100%;
            height: 25px;
            border-radius: 3px;
            border: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 10px;
            
            padding-left: 10px;
        }

        .login-button {
            width: 100%;
            height: 25px;
        

        }

        .find-password {
            text-decoration: none;
            font-size: 10px;
            color: aliceblue;
        }

        .find-password{
            margin-top: 20px;
            margin-left: 25%;
            display: block;
        }

    </style>
</head>

<body>
    <div class="login-box">

        <form action="">
            <div class="id-box">
                <input type="text" name="id" placeholder="아이디">
            </div>

            <div class="password-box">
                <input type="password" name="password" placeholder="비밀번호">
            </div>

            <button type="submit" class="login-button">로그인</button>

        </form>

        <a href="" class="find-password">
            비밀번호를 잊어버리셨나요?
        </a>

    </div>
</body>

</html>
