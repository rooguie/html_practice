<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes jump {
            0% {
                position: absolute;
                bottom: 0px;
            }

            25% {
                position: absolute;
                bottom: 30px;
            }

            50%{
                position: absolute;
                bottom: 0px;
            }

            75% {
                position: absolute;
                bottom: 60px;
            }

            100%{
                position: absolute;
                bottom: 0px;
            }

        }

        .animation {
            position: relative;
            animation-name: jump;
            animation-duration: 1s;
            animation-iteration-count: infinite;
        }
    </style>
</head>

<body>
    <div class="animation">hihihi</div>
</body>

</html>
