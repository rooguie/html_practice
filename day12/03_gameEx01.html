<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button>img {
            width: 200px;
            height: 200px;
        }
    </style>
</head>

<body>
    <button id="rock">
        <img src="../image/미확인 210174.crdownload" alt="">
    </button>
    <button id="sissors">
        <img src="../image/미확인 16290.crdownload" alt="">
    </button>
    <button id="paper">
        <img src="../image/미확인 9644.crdownload" alt="">
    </button>

    <h1 id="result"></h1>
    <h1 id="record"></h1>


    <script>

        document.getElementById("rock").addEventListener("click", play);
        document.getElementById("sissors").addEventListener("click", play);
        document.getElementById("paper").addEventListener("click", play);

        const array = ["가위", "바위", "보"];
        let winCount = 0;
        let loseCount = 0;
        let drawCount = 0;
        let totalRate=0;
        let winRate = 0;

        function play() {
            const com = Math.floor(Math.random() * 3 + 1);
            const id = this.id;

            let player = 0;

            let str = '';


            if (id == "rock") {
                player = 2;
            }

            else if (id == "sissors") {
                player = 1;
            }

            else {
                player = 3;
            }

            if (game(player, com) == 1) {
                winCount++;
                str = 'player win'
            }

            else if (game(player, com) == 0) {
                drawCount++;
                str = 'player draw'

            }

            else {
                loseCount++;
                str = 'player lose'
            }

            totalRate=winCount+loseCount;

            if(totalRate==0){
                totalRate=1;
            }

            winRate = (winCount / (totalRate))*100;

            document.getElementById("result").innerText =
                `
            player: ${array[player - 1]} / com: ${array[com - 1]} => ${str}
            `;
            document.getElementById("record").innerText = `
            win:${winCount} / draw:${drawCount} / lose:${loseCount}
            승률: ${winRate.toFixed(2)}%
            `;


        }


        function game(num1, num2) {
            if (num1 == 1) {
                if (num2 == 1) {
                    return 0; //무승부
                }

                else if (num2 == 2) {
                    return -1; //플레이어 짐
                }

                else {
                    return 1; //플레이어 이김
                }
            }

            if (num1 == 2) {
                if (num2 == 1) {
                    return 1; //이김
                }

                else if (num2 == 2) {
                    return 0; //무승부
                }

                else {
                    return -1; //짐
                }
            }

            if (num1 == 3) {
                if (num2 == 1) {
                    return -1; //짐
                }

                else if (num2 == 2) {
                    return 1; //이김
                }

                else {
                    return 0; // 무승부
                }
            }

        }


    </script>
</body>

</html>
