<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 70%;
            /* 중복되는 선 합치기 */
            border-collapse: collapse;
        }

        table th,
        td {
            text-align: center;
            font-size: 20px;
            height: 30px;
        }

        table>caption {
            font-size: 30px;
            margin: 20px;
        }

        table>thead>tr {
            background-color: bisque;
        }

        table>tfoot>tr {
            background-color: rgb(201, 207, 199);
            color: white;
        }

        /* 짝수 라인만 배경색 */
        table>tbody>tr:nth-child(even) {
            background-color: antiquewhite;
        }

        /* 모든 라인의 선 없애기 => 가로선만 긋기(선 색깔) */

        table>tfoot>tr{
            border-top: 1px solid black;
            border-bottom: 1px solid black;
        }

        table>tbody>tr{
            border-top: 1px solid black;
        }
        /* 마우스 올리면 tr색 변결 */


        table>tbody>tr:hover{
            background-color: aqua;
            color: aliceblue;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <table>
        <caption>성적표</caption>

        <thead>
            <th>번호</th>
            <th>이름</th>
            <th>성적</th>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>김철수</td>
                <td>성적</td>
            </tr>
            <tr>
                <td>2</td>
                <td>이영희</td>
                <td>88</td>
            </tr>
            <tr>
                <td>3</td>
                <td>박민수</td>
                <td>75</td>
            </tr>
            <tr>
                <td>4</td>
                <td>최지우</td>
                <td>92</td>
            </tr>
            <tr>
                <td>5</td>
                <td>정하늘</td>
                <td>81</td>
            </tr>

        </tbody>

        <tfoot>
            <tr>
                <th colspan="2">합계</th>
                <td>432</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
