<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        색상 관력 속석
        -color: 글자색
        -background-color: 배경색
        -border-color: 테두리 색

        색상 지정 방법
        -이미 지정된 이름 사용하는 방법:red, yellow 등
        -색상 코드를 이용하는 방법: 16진수 색상코드 
        -색상 팔레트를 이용하는 방법
            -rgb(0,0,0) 코드를 이용하는 방법
            -rgba(0,0,0,0) 색+투명도
        그라디언트: 여러 색상을 조합(https://cssgradient.io/)
        -background: liner-gradient(방형, 색상1, 색상2...)

        border-color: 선 색상
        선 두께, 선 모양,색 한 세트로 설정해야함 
        border: 선 두께 모양 색
        boder-style: 모양
        boder-color: 선 색상
    -->
    <style>
        div {
            width: 300px;
            height: 100px;
            text-align: center;
            /* 요소 가로 가운데 정렬*/
            line-height: 100px;
            /* 글자의 높이를 늘리는 역할-글자 가운데 정렬 역할*/
        }

        .color {
            color: brown;
            background-color: bisque;

        }

        .bg-color {
            background: #d93838;
            background: linear-gradient(90deg, rgba(217, 56, 56, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);
        }

        .b-color {
            border: 1px solid blue;
            border-style: dotted;
        }

        .box {
            background: #3F5EFB;
            background: radial-gradient(circle, rgba(63, 94, 251, 1) 0%, rgba(252, 70, 107, 1) 100%);
            border: 1px solid #FF0000;

        }
    </style>
</head>

<body>
    <div class="color">글자색</div>
    <div class="bg-color">배경색</div>
    <div class="b-color">테두리색</div>
    <div class="box">test</div>
</body>

</html>
