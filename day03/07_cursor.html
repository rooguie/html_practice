<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
    cursor: 마우스 포인터 모양을 주는 속성
    -pointer: 손가락 모양
    -->
    <style>
        @font-face {
            font-family: Black_Han_Sans;
            src: url(../font/Black_Han_Sans/BlackHanSans-Regular.ttf);

        a {

            font-weight: 400;
            font-style: normal;
            font-size: 50px;

        a:hover {

        }

        .box {
            font-family: "Black_Han_Sans", sans-serif;
            font-weight: 400;
            font-size: 25px;
            color: #03c75a;
        }
    </style>
</head>

<body>

    <a href="http://naver.com" target="_blank">naver</a>
