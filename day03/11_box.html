<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        box-sizing: box의 크기를 지정하는 속성
        width: 컨텐츠의 가로 길이
        box-sizing에 따라 width 크기가 컨텐츠의 가로 길이가 될 수도 있고,
        박스 전체의 가로 길이가 될 수도 있음.

        -border-box: width=> 컨텐츠의 가로+패딩(왼+오)+테두리(왼+오)
        -content-box: width=> 컨텐츠의 가로(기본)

        width=100px / padding=5px / border=1px
        -border-box: 가로길이(88px) +5 +5 +1 +1 => 100px
        -content-box: 가로길이(100) +5 +5 +1 +1 => 112px

        padding: border 안쪽의 여백
        magin: border 바깥쪽의 여백
        top bottom left right 별도 설정 가능
        
        margin:[top=bottom=left=right]; => 상하좌우 모두 같은 값
        margin:[top=bottom] [left=right]; => 상하 좌우 
        margin:[top] [left=right] [bottom] => 상 좌우 하
        margin:[top] [right] [bottom] [left]=> 시계 방향
    -->
    <style>
        @font-face {
            font-family: Black_Han_Sans;
            src: url(../font/Black_Han_Sans/BlackHanSans-Regular.ttf);
        }

        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            padding: 5px;
            box-sizing: border-box;
        }

        .box1 {
            background-color: crimson;
            box-sizing: border-box;
        }

        .box2 {
            background-color: blue;
            box-sizing: content-box;
        }

        .naver {
            font-family: "Black_Han_Sans", sans-serif;
            font-size: large;
            color: white;
            width: 380px;
            height: 56px;
            margin: 30px;
            background-color: rgb(31, 154, 31);
            text-align: center;
            line-height: 60px;
            border-radius: 8px;
        }

        .naver:hover {
            background-color: green;
        }

        .link{
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="box box1"></div>
    <div class="box box2"></div>

    <!-- naver box 380*56 -->
    <a href="http://naver.com" target="_blank" class="link">
        <div class="naver">NAVER</div>
    </a>
</body>

</html>
