<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@100..900&family=Stylish&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        font 지정
        -글꼴/크기/스타일/굵기
        -font-family: 브라우저마다 지원하는 폰트가 다르고, 언어마다 달라서 폰트 묶음으로 설정
            -지정하려고 하는 폰트를 ,(쉼표)로 나열
            -한글 폰트인 경우 한글 이름고, 영문이름 같이 사용
            -마지막 폰트는 기본형으로 지정(serif)
            -폰트명은 "" 안씀. 단, 띄어쓰기가 있으면 "맑은 고딕" 이런 식으로 사용

        -font-size: 글자크기
        -font style: 밑줄, 기울림꼴, 취소선...
        -font-weight: 굵기 100~900 100단위로 지정(700정도 굵게 정도)
        -font: 속성을 한번에 지정하는 경우
        -font [style | weight] size family

        fontgoogle 가져오기
        <head> 안에 링크를 붙여서 사용하는 방식: CDN 방식
    -->
    <style>
        /* 다운로드 받은 폰트 사용 */
        /* 같은 이름의 폰트를 글자 스타일을 바꿔서 사용가능 단 다른 조건을 같이 써줘야함 */
        @font-face {
            font-family: Black_Han_Sans;
            src: url(../font/Black_Han_Sans/BlackHanSans-Regular.ttf);
        }
        
        .font {
            font-family: "Black_Han_Sans", sans-serif;
            font-weight: 400;
            font-style: normal;
            font-size: 50px;
        }
    </style>
</head>

<body>
    <div class="font">test font</div>
</body>

</html>
