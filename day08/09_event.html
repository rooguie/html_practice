<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .a {
            color: bisque;
            background-color: violet;
        }

        .b {
            color: blueviolet;
            background-color: darkorange;
        }

        .c {
            color: white;
            background-color: blue;
        }
    </style>
</head>

<body>
    <h1>
        event: 전역객체로서 모든 태그에 객체를 참조시킬 수 있다.
    </h1>

    <!-- 
        -a 태그와 button 태그에 이벤트를 참조시켜 클릭에 대한 반응으로
        기대할 수 있는 구조를 만드는게 일반적
        -type="button" 일반버튼을 이용하여 이벤트를 참조시킴
        -a 태그 href 속성에 의해 자체 이동(동기화방식)이 구현되어 있음.
        -a 태그에 이벤트를 부여할 때는 별도의 이동을 막는 코드가 필요

        -이벤트를 부여하는 방법에는 크게 3가지로 구분
        -각자 목적과 작동하는 방식이 조금씩 다름.

        -화면의 영역의 태그 객체를 document영역 (객체)라고 한다.
        -DOM(Document Object Model): 문서 객체 모델
        -tag => html element
        -속성 => attribute
        -<h1>글자 </h1> => 태그 내부의 일반 텍스트 => textnode /element innerText
        -<div><span>이용문의</span></div> => element innerHTML

        property
        -innerText: element 내부의 글자
        -innerHTML: element 내부 HTML 요소
        -getElementBy** / id / tagName / className
            -해당 요소 자체를 가져올 때 사용하는 용어
            -HTMLCollection 객체로 가져오게 됨.

        -querySelector('css의 select')
            -해당 요소자체를 가져올 때 사용
            -NodeList 객체로 가져오게 됨.
    -->

    <button onclick="eventfunc()">클릭해주세요.</button>
    <button onclick="eventfunc2('2번')">2번 버튼</button>
    <button onclick="eventfunc2('3번')">3번 버튼</button>
    <button id="btn">button</button>
    <button id="test">test</button>
    <h1 id="printResult"></h1>

    <script>
        //방법 1. 버튼에 onclick 이벤트를 달아주는 방법 => 하나의 이벤트만 등록 가능
        //방법 2. EventListener를 다는 방법=> 여러개의 이벤트를 등록할 수 있음
        //방법 3. 객체를 가져와 객체에 onclickd을 다는 방법

        // h1 태그 printResult 객체를 인지
        const printResult = document.getElementById("printResult");
        console.log(printResult);

        //객체를 인지해 onclick 다는 방법
        document.getElementById('test').onclick = function () {
            printResult.innerHTML = '<span class="c">test button click!!</span>'
        }

        // eventListner 다는 방법
        document.getElementById('btn').addEventListener('click', function () {
            printResult.innerText = 'button click!!';
        })

        function eventfunc() {
            //버튼을 클릭하면 printResult '버튼을 클릭했습니다.' 글자가 출력
            printResult.innerText = '버튼을 클릭했습니다.'
        }


        function eventfunc2(param) {
            let color;
            if (param == '2번') {
                color = 'a'
            }
            else {
                color = 'b'
            }

            printResult.innerHTML = `<span class=${color}>${param} 버튼을 클릭했습니다.</span>`;

        }



        const printResultQuerySelector = document.querySelector('#printResult');
        console.log(printResultQuerySelector);


    </script>
</body>

</html>
