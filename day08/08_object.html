<body>
    <h1>
        object(객체): 식별할 수 있는 것을 상세 특징으로 표현하려한 형식
    </h1>
    <!-- 
        -const 상수로 선언하는 것이 일반적: 객체의 지속성을 확보하기 위함.
        {} key:value

        {
            key:value,
            key:value,
            ....
        }

        -key값은 같은 객체 내에서는 중복 불가능.(고유키)
        -value는 중복가능
        -key는 string 
        -value는 제한이 없음
        -value로 function을 정의하면 그 함수(익명함수처럼 정의)를 메서드라고 부름
            익명함수는 key함수명이 됨
    -->

    <script>
        const car = {
            name: 'myCar',
            year: 2025,
            color: 'red'
        }

        console.log(car);
        // car=100; =>불가능(선언한 객체를 지킬 수 있음-지속성 확보)
        console.log(car.name); // 자바에서의 getter
        console.log(car.color);
        car.door = 4; // 객체의 속성을 추가할 때
        car.name = 'sonata'; // key 값의 value 변경

        console.log(car);

        let myCar = {
            name: 'yourCar',
            year: 2026,
            color: 'yello'
        }

        console.log(myCar);
        myCar = 100;
        //myCar의 객체는 사라짐.(객체를 선언하고 활용하려고 했던 목적이 없어짐)
        console.log(myCar);
    </script>

    <script>
        const me = {
            firstName: 'hong',
            lastName: 'gildong',
            age: 20,
            address: 'seoul',
            "hobby": "reading",
            avail: {
                year: 2025,
                title: 'javascript',
                ver: 'ES6+',
                project: 'javaScript Project',
                intro: function () {
                    console.log('객체 내부에서 선언된 함수');
                    console.log(me.firstName, me.lastName);
                    return `${this.title} : ${this.ver}`;
                }
            },
            year: 2006
        }
        console.log(me);

        //이름: 객체명.key => value 리턴
        console.log(me.firstName, me.lastName);

        //주소
        console.log(me.address);
        console.log(me.avail.title);
        console.log(me.avail.intro); // 함수 지목(실행X)
        console.log(me.avail.intro()); // 함수 실행 invoke()

        let keyName = 'age';
        //[] 객체명[keyString] 
        console.log(me["hobby"]);
        console.log(me[keyName]);
        console.log(me["avail"]["intro"]())
        console.log(me.avail["title"]);
        console.log(me["avail"].ver);

        console.log("-------------------------------------");



    </script>
