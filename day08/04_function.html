<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>
        function 함수: 특정 기능을 수행하기 위해 작성한 코드
        java에서의 method와 동일한 의미
    </h1>
    <!-- 
        -함수는 호출되어야 실행
        -자바의 method처럼 호출해서 실행
        -자바에서는 class -> method -> 객체 생성 -> 호출
        -자바 스크립트는 어디서든 function 생성 가능 -> 호출

        function 함수명(파라미터){
            console.log(파라미터)
            로직 작성;
            return 값; (없으면 안쓰면 됨)
        }
        -함수명: 기능을 함축적으로 작성
        -파라미터(매개변수): 없어도 ()는 있어야 함.
        -자바스크립트는 파라미터의 자유도가 높아서 다양한 형태로 사용 가능
        -return: 함수 종료의 역할과 동시에 특정 결과값을 호출한 위치로 반환
    -->
    <script src="01_script.js"></script>
    <script>

        myFirstFunction(); //함수 호출 => 내 파일 안에서는 어디서든 호출 가능=> 호이스팅 때문에

        //함수 선언
        function myFirstFunction() {
            console.log("첫번째 함수");
        }

        mySecondFunc(); //외부파일에서 작성한 함수(외부 파일 호출을 미리 해놔야 함)

        //파라미터를 받는 함수
        function call(name){
            console.log(`내 이름은 ${name}입니다.`);
        }

        call('홍길동');
        let name='김영이';
        call(name);

        //num1, num2 두 수를 파라미터로 받아 두 수의 합을 콘솔에 출력하는 함수 생성=> 호출

        function hap(num1,num2){
            console.log(`두 수의 합=>${num1+num2}`);
            return num1+num2;
        }

       let result= hap(10,1);
       console.log(result);
    </script>

</body>

</html>
