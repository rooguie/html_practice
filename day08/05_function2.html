<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>함수의 파라미터와 리턴 타입</h1>
    <!-- 
        파라미터의 개수는 제한이 없으나, 많으면 관리가 힘듦
        파라미터의 타입도 제한이 없음, 전달된 내용 그대로 사용
        파라미터의 변수명은 외부 변수명과 같아도, 달라도 상관없음.
        return 유무에 따라 값을 리턴 받을 수도 있고, 그냥 종료 될 수도 있음
        return의 위치에 따라 종료 시점을 결정
    -->

    <script>
        let myName = '홍길동';

        function callName(name) {
            let yourName = '김순이';
            console.log(`파라미터=>${name}`); //인지 가능.
            console.log(`함수 내부에서 선언한 변수=> ${yourName}`); //인지 가능

            //함수 호출 전에 선언되어 있으면 인지 가능. 아니면 불가능
            console.log(`함수 외부에서 선언한 변수=>${myName}`); //?
            console.log(`함수 외부에서 선언한 변수=>${myName2}`); //?
        }

        //함수 내부에 선언된 yourName 인지 불가능

        //callName('영이2'); //호출 시점2

        let myName2 = 'hong gill dong';

        //호출 시점1
        callName('영이');

        //return이 있는 함수
        //num1, num2를 파라미터로 받아 덧셈 결과를 리턴
        function sum(num1, num2) {
            return num1 + num2;
        }

        let result = sum(10, 20);
        console.log(result);
        console.log(sum(100, 200));

        //표현식 함수 react, js 라이브러리 등에서 많이 사용됨.
        const myFunc = function (param) {
            return `Hello~!! ${param}`
        }

        let result2 = myFunc('hong');
        console.log(result2);

        //화살표 함수(arrow function)
        const arrowFunc = (param1, param2) => {
            return param1 + param2;
        }

        let arrowResult = arrowFunc(50, 60);
        console.log(arrowResult);

        const arrowfunc2 = (p1, p2) => (p1 + p2);
        console.log(arrowfunc2(100,200));

        const arrowfunc3=(p1,p2)=>{
            console.log(p1+p2);
        }

        arrowfunc3(1000,2000);

        //함수 생성
        //파라미터로 이름과 취미를 받아서 콘솔에 출력
        //홍길동은 독서를 좋아합니다.
        //function / 표현식 / 화실표함수

        let name='홍길동';
        let hobby='독서';

        //function
        function text1(name,hobby){
            console.log(`${name}은(는) ${hobby}을(를) 좋아합니다.`)
        }

        text1(name,hobby);

        //표현식
        const text2=function(name,hobby) {
            return `${name}은(는) ${hobby}을(를) 좋아합니다.`;
        }

        console.log(text2(name,hobby));

        //화살표함수
        const text3=(name,hobby)=>{
            return `${name}은(는) ${hobby}을(를) 좋아합니다.`
        }

        console.log(text3(name,hobby));

    </script>
</body>

</html>
