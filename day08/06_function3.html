<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>함수 내 호출</h1>
    <!-- 
        함수 안에서 함수를 호출
    -->

    <script>
        function subFunc(p1, p2) {
            return p1 - p2;
        }

        function sumFunc(p1, p2) {
            console.log(subFunc(p1, p2)); // subFunc 호출
            return p1 + p2;
        }

        console.log(sumFunc(100, 200));

        function func1(p1, p2) {
            return p1 + p2;
        }

        function func2(p1, p2) {
            return func1(p1, p2);
        }

        function func3(p1, p2) {
            return func2(p1, p2);
        }

        const result = func3(10, 20);
        console.log(result);

        function myFunc(myName) {
            console.log(`myFunc function`);
            return `Hello~!! ${myName}`;
        }

        function myFuncOld(myName) {
            console.log(`myFunc function`);
            return `Hello~!! ${myName}`;
        }

        console.log(myFunc('홍길동'));
        console.log(myFuncOld('홍길동'));
        console.log(myFuncOld(myFunc('순이')));
        console.log(myFunc);
    </script>
</body>

</html>
