<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        p-box(h 150px) box(100*100) 3개 나열 position 사용

        outer 300*300 > inner 100*100 정 가운데 위치
    -->

    <style>
        .p-box {
            height: 150px;
            background-color: chocolate;
            position: relative;
        }

        .box1 {
            width: 100px;
            height: 100px;
            background-color: blue;
            position: absolute;

            top: 25px;
            left: 25px;
        }

        .box2 {
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            position: absolute;


            top: 25px;
            left: 50%; /* 부모 박스 기준 절반*/
            transform: translate(-50%); /* 나의 요소가 변화하는 기능, 나 자신 기준*/
        }

        .box3 {
            width: 100px;
            height: 100px;
            background-color: cadetblue;
            position: absolute;


            top: 25px;
            right: 25px;
        }

        .outer{ 
            width: 300px;
            height: 300px;
            background-color: aquamarine;
            position: relative;
        }

        .inner{
            width: 100px;
            height: 100px;
            background-color: antiquewhite;
            position: absolute;

            /* 요소를 정 가운데 위치시키는 방법 */
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>

<body>

    <div class="p-box">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
    </div>

    <div class="outer">
        <div class="inner"></div>
    </div>
</body>

</html>
