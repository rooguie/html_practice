<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        display 속성
        -태그가 가지고 있는 기본 속성을 변경하는 기능
        -block
            -새 라인에서 시작(한 컨텐츠가 한 라인을 차지하는 태그)
            -width, height 크기 조절이 가능
            -여백 조절 가능(margin, padding)
            -각자 마진을 가지고 있으면 중간 마진은 하나로 합쳐진다
        -inline
            -현재라인에서 이어서 시작(자신의 컨텐츠 만큼만 자리를 차지하는 태그)
            -width, height 조절이 불가능
            -margin 불가능, padding
        -inlineblock
            -현재 라인에서 이어서 시작(자신의 컨텐츠 만큼만 자리를 차지하는 태그)
            -width, height 크기 조절이 가능
            -여백 조절 가능(margin, padding)
    -->
    <style>
        div {
            width: 200px;
            height: 50px;
            background-color: aliceblue;
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
            box-sizing: content-box;
        }

        span,
        b {
            width: 200px;
            height: 50px;
            background-color: aquamarine;
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
            box-sizing: content-box;
            display: block;
        }

        button {
            width: 200px;
            height: 50px;
            background-color: brown;
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
            box-sizing: content-box;

        }
    </style>
</head>

<body>
    <div>block 속성</div>
    <span>inline 속성</span>
    <b>inline 속성</b>
    <button>inlineblock 속성</button>
</body>

</html>
